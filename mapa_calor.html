<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0"/>
<meta name="theme-color" content="#1A1A1A"/>
<title>Mapa de Calor — Avante 70 · 2026</title>
<style>
:root{
  --amarelo:#F5C000;--laranja:#E87722;--preto:#1A1A1A;
  --green:#1A7A4A;--red:#7B241C;--blue:#1B4F8A;
  --border:#333;--muted:#718096;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif;
  background:#111;color:#fff;min-height:100vh;padding-bottom:80px}
.header{background:var(--preto);padding:14px 16px;position:sticky;top:0;
  z-index:100;border-bottom:2px solid var(--amarelo)}
.header-top{display:flex;align-items:center;gap:10px}
.logo{width:36px;height:36px;border-radius:50%;background:var(--amarelo);
  display:flex;align-items:center;justify-content:center;
  font-size:13px;font-weight:900;color:var(--preto);flex-shrink:0}
.header h1{font-size:15px;font-weight:700;color:var(--amarelo)}
.header p{font-size:10px;color:rgba(255,255,255,.5);margin-top:1px}
.content{padding:12px}
.card{background:#1E1E1E;border-radius:12px;padding:14px;
  margin-bottom:12px;border:0.5px solid var(--border)}
.sec-lbl{font-size:10px;font-weight:700;color:var(--muted);
  text-transform:uppercase;letter-spacing:.07em;margin-bottom:10px;display:block}

/* FILTROS */
.filtros{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap}
.filtro-btn{padding:6px 12px;border-radius:20px;border:0.5px solid var(--border);
  background:#1E1E1E;cursor:pointer;font-size:11px;font-weight:500;
  color:var(--muted);transition:all .15s;white-space:nowrap}
.filtro-btn.active{background:var(--amarelo);color:var(--preto);
  border-color:var(--amarelo);font-weight:700}

/* MAPA DE CALOR — GRID */
.heatmap-wrap{overflow-x:auto;margin-bottom:14px}
.heatmap-table{width:100%;border-collapse:separate;border-spacing:3px;
  min-width:480px}
.heatmap-table th{font-size:10px;color:var(--muted);font-weight:600;
  padding:4px 6px;text-align:center;white-space:nowrap}
.heatmap-table td{border-radius:6px;padding:8px 4px;text-align:center;
  cursor:pointer;transition:transform .15s;position:relative}
.heatmap-table td:hover{transform:scale(1.05);z-index:2}
.cell-val{font-size:14px;font-weight:700}
.cell-lbl{font-size:8px;opacity:.7;margin-top:1px}

/* BARRAS POR INTERESSE */
.int-bars{display:flex;flex-direction:column;gap:8px;margin-bottom:14px}
.int-row{display:flex;align-items:center;gap:8px}
.int-emoji{font-size:16px;width:24px;flex-shrink:0;text-align:center}
.int-nome{font-size:11px;width:90px;flex-shrink:0;color:#fff}
.int-bar-track{flex:1;height:20px;background:#1A1A1A;border-radius:4px;overflow:hidden}
.int-bar-fill{height:100%;border-radius:4px;display:flex;align-items:center;
  justify-content:flex-end;padding-right:6px;font-size:9px;
  font-weight:700;color:#fff;transition:width .8s}
.int-total{font-size:11px;font-weight:600;width:32px;text-align:right;flex-shrink:0}
.int-pct{font-size:10px;color:var(--muted);width:32px;flex-shrink:0}

/* TOP MUNICÍPIOS */
.municipio-list{display:flex;flex-direction:column;gap:6px}
.mun-card{background:#111;border-radius:8px;padding:9px 12px;
  display:flex;align-items:center;gap:10px}
.mun-rank{font-size:16px;font-weight:900;color:var(--amarelo);
  width:24px;flex-shrink:0;text-align:center}
.mun-info{flex:1;min-width:0}
.mun-nome{font-size:12px;font-weight:600;white-space:nowrap;
  overflow:hidden;text-overflow:ellipsis}
.mun-sub{font-size:10px;color:var(--muted);margin-top:1px}
.mun-total{font-size:18px;font-weight:700;color:var(--amarelo);flex-shrink:0}

/* CANDIDATO TABS */
.cand-tabs{display:flex;gap:6px;margin-bottom:14px;overflow-x:auto;
  -webkit-overflow-scrolling:touch;scrollbar-width:none}
.cand-tabs::-webkit-scrollbar{display:none}
.cand-tab{flex-shrink:0;padding:7px 13px;border-radius:20px;
  border:0.5px solid var(--border);background:#1E1E1E;cursor:pointer;
  font-size:11px;font-weight:500;color:var(--muted)}
.cand-tab.active{color:var(--preto);font-weight:700}

.bottom-nav{position:fixed;bottom:0;left:0;right:0;
  background:var(--preto);border-top:0.5px solid var(--border);
  display:flex;z-index:100;padding-bottom:env(safe-area-inset-bottom)}
.nav-btn{flex:1;padding:10px 4px 8px;background:none;border:none;cursor:pointer;
  display:flex;flex-direction:column;align-items:center;gap:2px;
  font-size:10px;font-weight:500;color:var(--muted)}
.nav-btn.active{color:var(--amarelo)}
.nav-btn svg{width:22px;height:22px;stroke:currentColor;fill:none;
  stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.panel{display:none}.panel.active{display:block}

.tooltip{position:fixed;background:#1E1E1E;border:0.5px solid var(--amarelo);
  border-radius:8px;padding:8px 12px;font-size:11px;color:#fff;
  z-index:200;pointer-events:none;display:none;max-width:200px;line-height:1.6}
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div class="logo">70</div>
    <div style="flex:1">
      <h1>🗺️ Mapa de Calor</h1>
      <p>Interesse × Localidade — Avante 70 · 2026</p>
    </div>
  </div>
</div>

<div class="tooltip" id="tooltip"></div>

<div class="content">

  <!-- INTERESSE × ZONA -->
  <div class="panel active" id="panel-heatmap">

    <!-- Tabs candidato -->
    <div class="cand-tabs" id="cand-tabs"></div>

    <!-- Filtro tipo local -->
    <div class="filtros" id="filtros-local">
      <button class="filtro-btn active" data-local="todos" onclick="filtrarLocal(this)">Todos</button>
      <button class="filtro-btn" data-local="capital" onclick="filtrarLocal(this)">🏙️ Capital</button>
      <button class="filtro-btn" data-local="interior" onclick="filtrarLocal(this)">🌿 Interior</button>
    </div>

    <!-- Heatmap Interesse × Zona -->
    <div class="card">
      <span class="sec-lbl">Interesse × Zona eleitoral</span>
      <div class="heatmap-wrap">
        <table class="heatmap-table" id="heatmap-table"></table>
      </div>
      <div style="display:flex;align-items:center;gap:6px;margin-top:8px">
        <span style="font-size:10px;color:var(--muted)">Frio</span>
        <div style="flex:1;height:8px;border-radius:4px;
          background:linear-gradient(90deg,#1A1A1A,#4A235A,#A04000,#F5C000)"></div>
        <span style="font-size:10px;color:var(--muted)">Quente</span>
      </div>
    </div>

    <!-- Barras por interesse -->
    <div class="card">
      <span class="sec-lbl">Ranking de interesses</span>
      <div class="int-bars" id="int-bars"></div>
    </div>

    <!-- Top municípios do interior -->
    <div class="card" id="card-municipios">
      <span class="sec-lbl">Top municípios do interior</span>
      <div class="municipio-list" id="municipio-list"></div>
    </div>

  </div>

  <!-- CRUZAMENTO FAIXA × INTERESSE -->
  <div class="panel" id="panel-faixa">
    <div class="cand-tabs" id="cand-tabs2"></div>
    <div class="card">
      <span class="sec-lbl">Interesse por faixa etária</span>
      <div class="heatmap-wrap">
        <table class="heatmap-table" id="heatmap-faixa"></table>
      </div>
    </div>
    <div class="card">
      <span class="sec-lbl">Interesse por gênero</span>
      <div id="genero-bars"></div>
    </div>
  </div>

</div>

<nav class="bottom-nav">
  <button class="nav-btn active" id="nav-heatmap" onclick="setTab('heatmap')">
    <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M3 15h18M9 3v18M15 3v18"/></svg>
    Heatmap
  </button>
  <button class="nav-btn" id="nav-faixa" onclick="setTab('faixa')">
    <svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75"/></svg>
    Faixa × Interesse
  </button>
</nav>

<script>
const CANDIDATOS = [
  {nome:"Todos",     slug:"todos",  cor:"#F5C000", key:null},
  {nome:"Aryel 7070",slug:"aryel",  cor:"#E87722", key:"eleitores_aryel"},
  {nome:"Daniel 70070",slug:"daniel",cor:"#C49A00", key:"eleitores_daniel"},
  {nome:"David 70",  slug:"david",  cor:"#A04000", key:"eleitores_david"},
];

const INTERESSES = [
  {nome:"Saúde",        emoji:"🏥"},
  {nome:"Segurança",    emoji:"🛡️"},
  {nome:"Educação",     emoji:"📚"},
  {nome:"Emprego",      emoji:"💼"},
  {nome:"Infraestrutura",emoji:"🏗️"},
  {nome:"Transporte",   emoji:"🚌"},
  {nome:"Moradia",      emoji:"🏠"},
  {nome:"Agricultura",  emoji:"🌱"},
  {nome:"Meio Ambiente",emoji:"🌿"},
  {nome:"Mulheres",     emoji:"👩"},
  {nome:"Juventude",    emoji:"🎓"},
  {nome:"Outro",        emoji:"📝"},
];

const ZONAS   = ["Z. Norte","Z. Sul","Centro","Z. Oeste","Z. Leste","Interior"];
const ZONAS_F = ["Zona Norte","Zona Sul","Centro","Zona Oeste","Zona Leste","Interior"];
const FAIXAS  = ["16-17 anos","18-24 anos","25-34 anos","35-44 anos","45-59 anos","60+ anos"];

let candAtivo  = "todos";
let localFiltro = "todos";

function carregarDados() {
  let lista = [];
  CANDIDATOS.slice(1).forEach(c => {
    const l = JSON.parse(localStorage.getItem(c.key)||"[]");
    l.forEach(e => { e._cand = c.slug; });
    lista = lista.concat(l);
  });
  return lista;
}

function filtrarLista() {
  let lista = carregarDados();
  if (candAtivo !== "todos")
    lista = lista.filter(e => e._cand === candAtivo);
  if (localFiltro !== "todos")
    lista = lista.filter(e => (e.tipo_local||"capital") === localFiltro);
  return lista;
}

// Cor de calor baseada no valor
function corCalor(val, max) {
  if (!val || !max) return "#1A1A1A";
  const pct = val / max;
  if (pct > 0.75) return "#A04000";
  if (pct > 0.5)  return "#C49A00";
  if (pct > 0.25) return "#4A235A";
  if (pct > 0)    return "#1B3A5A";
  return "#1A1A1A";
}

function render() {
  const lista = filtrarLista();

  // Tabs candidato
  ["cand-tabs","cand-tabs2"].forEach(id => {
    document.getElementById(id).innerHTML = CANDIDATOS.map(c => `
      <button class="cand-tab ${candAtivo===c.slug?"active":""}"
        style="${candAtivo===c.slug?`background:${c.cor};border-color:${c.cor}`:""}"
        onclick="filtrarCand('${c.slug}')">${c.nome}</button>
    `).join("");
  });

  // ── HEATMAP INTERESSE × ZONA ──
  const matrix = {};
  INTERESSES.forEach(int => {
    matrix[int.nome] = {};
    ZONAS_F.forEach(zona => { matrix[int.nome][zona] = 0; });
  });
  lista.forEach(e => {
    const int  = e.interesse;
    const zona = e.zona;
    if (int && zona && matrix[int] && matrix[int][zona] !== undefined)
      matrix[int][zona]++;
  });

  const maxVal = Math.max(...Object.values(matrix).flatMap(z => Object.values(z)), 1);

  let thead = "<tr><th style='text-align:left;padding:4px 6px'>Interesse</th>";
  ZONAS.forEach(z => { thead += `<th>${z}</th>`; });
  thead += "</tr>";

  let tbody = "";
  INTERESSES.forEach(int => {
    tbody += `<tr>`;
    tbody += `<td style="text-align:left;padding:4px 6px;font-size:11px;color:#fff;white-space:nowrap">
      ${int.emoji} ${int.nome}</td>`;
    ZONAS_F.forEach(zona => {
      const val = matrix[int.nome][zona];
      const cor = corCalor(val, maxVal);
      const txt = val > 0 ? val : "";
      tbody += `<td style="background:${cor};min-width:36px"
        onmouseenter="showTip(event,'${int.nome} · ${zona}: ${val} eleitor${val!==1?"es":""}')"
        onmouseleave="hideTip()">
        <div class="cell-val" style="color:${val>0?"#fff":"#333"}">${txt}</div>
      </td>`;
    });
    tbody += `</tr>`;
  });
  document.getElementById("heatmap-table").innerHTML = thead + tbody;

  // ── BARRAS POR INTERESSE ──
  const porInt = {};
  INTERESSES.forEach(i => { porInt[i.nome] = 0; });
  lista.forEach(e => { if (e.interesse && porInt[e.interesse]!==undefined) porInt[e.interesse]++; });
  const maxInt = Math.max(...Object.values(porInt), 1);
  const totalInt = lista.length || 1;

  const cand = CANDIDATOS.find(c=>c.slug===candAtivo) || CANDIDATOS[0];

  document.getElementById("int-bars").innerHTML = INTERESSES
    .map(i => ({...i, n: porInt[i.nome]}))
    .sort((a,b) => b.n - a.n)
    .map(i => {
      const pct = Math.round(i.n/maxInt*100);
      const pctTotal = Math.round(i.n/totalInt*100);
      return `<div class="int-row">
        <span class="int-emoji">${i.emoji}</span>
        <span class="int-nome">${i.nome}</span>
        <div class="int-bar-track">
          <div class="int-bar-fill" style="width:${pct}%;background:${cand.cor}">
            ${pct>15?i.n:""}
          </div>
        </div>
        <span class="int-total" style="color:${cand.cor}">${i.n}</span>
        <span class="int-pct">${pctTotal}%</span>
      </div>`;
    }).join("");

  // ── TOP MUNICÍPIOS ──
  const porMun = {};
  lista.filter(e=>e.tipo_local==="interior"||e.zona==="Interior").forEach(e => {
    const m = e.municipio||e.bairro||"Não informado";
    if (!porMun[m]) porMun[m] = {total:0,ints:{}};
    porMun[m].total++;
    const int = e.interesse||"Outro";
    porMun[m].ints[int] = (porMun[m].ints[int]||0)+1;
  });

  const topMuns = Object.entries(porMun)
    .sort((a,b)=>b[1].total-a[1].total).slice(0,8);

  const emojis = {"1":"🥇","2":"🥈","3":"🥉"};
  document.getElementById("municipio-list").innerHTML = topMuns.length
    ? topMuns.map(([mun,d],i) => {
        const topInt = Object.entries(d.ints).sort((a,b)=>b[1]-a[1])[0];
        const intInfo = INTERESSES.find(x=>x.nome===topInt?.[0]);
        return `<div class="mun-card">
          <div class="mun-rank">${emojis[i+1]||i+1}</div>
          <div class="mun-info">
            <div class="mun-nome">${mun}</div>
            <div class="mun-sub">${intInfo?intInfo.emoji+" "+topInt[0]:"—"} é o principal interesse</div>
          </div>
          <div class="mun-total">${d.total}</div>
        </div>`;
      }).join("")
    : `<div style="text-align:center;padding:20px;color:var(--muted);font-size:13px">
        Nenhum cadastro do interior ainda.</div>`;

  // ── HEATMAP FAIXA × INTERESSE ──
  const matFaixa = {};
  FAIXAS.forEach(f => {
    matFaixa[f] = {};
    INTERESSES.forEach(i => { matFaixa[f][i.nome] = 0; });
  });
  lista.forEach(e => {
    const f = e.idade;
    const i = e.interesse;
    if (f && i && matFaixa[f] && matFaixa[f][i] !== undefined)
      matFaixa[f][i]++;
  });

  const maxFaixa = Math.max(...Object.values(matFaixa).flatMap(v=>Object.values(v)), 1);

  let thF = "<tr><th style='text-align:left;padding:4px 6px'>Faixa</th>";
  INTERESSES.forEach(i => { thF += `<th style="font-size:13px">${i.emoji}</th>`; });
  thF += "</tr>";

  let tbF = "";
  FAIXAS.forEach(f => {
    tbF += `<tr>`;
    tbF += `<td style="text-align:left;padding:4px 6px;font-size:10px;color:#fff;white-space:nowrap">${f}</td>`;
    INTERESSES.forEach(i => {
      const val = matFaixa[f][i.nome];
      const cor = corCalor(val, maxFaixa);
      tbF += `<td style="background:${cor};min-width:28px"
        onmouseenter="showTip(event,'${f} · ${i.nome}: ${val}')"
        onmouseleave="hideTip()">
        <div class="cell-val" style="color:${val>0?"#fff":"#333"};font-size:12px">${val||""}</div>
      </td>`;
    });
    tbF += `</tr>`;
  });
  document.getElementById("heatmap-faixa").innerHTML = thF + tbF;

  // ── INTERESSE POR GÊNERO ──
  const generos = ["Masculino","Feminino","Outro"];
  const porGen  = {};
  generos.forEach(g => {
    porGen[g] = {};
    INTERESSES.forEach(i => { porGen[g][i.nome] = 0; });
  });
  lista.forEach(e => {
    const g = e.genero;
    const i = e.interesse;
    if (g && i && porGen[g] && porGen[g][i] !== undefined)
      porGen[g][i]++;
  });

  const cores_gen = {Masculino:"#1B4F8A",Feminino:"#7B241C",Outro:"#4A235A"};

  document.getElementById("genero-bars").innerHTML = generos.map(g => {
    const total = Object.values(porGen[g]).reduce((a,b)=>a+b,0);
    if (!total) return "";
    const top = Object.entries(porGen[g]).sort((a,b)=>b[1]-a[1]).slice(0,3);
    return `<div style="margin-bottom:14px">
      <div style="font-size:12px;font-weight:600;color:${cores_gen[g]};margin-bottom:6px">
        ${g==="Masculino"?"👨":g==="Feminino"?"👩":"🧑"} ${g} — ${total} cadastros
      </div>
      ${top.map(([int,n]) => {
        const info = INTERESSES.find(x=>x.nome===int);
        const pct  = Math.round(n/total*100);
        return `<div style="display:flex;align-items:center;gap:6px;margin-bottom:4px">
          <span style="font-size:14px;width:20px">${info?.emoji||"📝"}</span>
          <span style="font-size:11px;color:#fff;width:100px">${int}</span>
          <div style="flex:1;height:12px;background:#1A1A1A;border-radius:3px;overflow:hidden">
            <div style="width:${pct}%;height:100%;background:${cores_gen[g]};border-radius:3px"></div>
          </div>
          <span style="font-size:10px;color:var(--muted);width:36px;text-align:right">${n} (${pct}%)</span>
        </div>`;
      }).join("")}
    </div>`;
  }).join("");
}

function filtrarCand(slug) {
  candAtivo = slug;
  render();
}

function filtrarLocal(btn) {
  document.querySelectorAll(".filtro-btn").forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");
  localFiltro = btn.dataset.local;
  render();
}

function setTab(id) {
  ["heatmap","faixa"].forEach(t => {
    document.getElementById("panel-"+t).classList.toggle("active",t===id);
    document.getElementById("nav-"+t).classList.toggle("active",t===id);
  });
}

function showTip(e, txt) {
  const t = document.getElementById("tooltip");
  t.textContent = txt;
  t.style.display = "block";
  t.style.left = Math.min(e.clientX+10, window.innerWidth-210) + "px";
  t.style.top  = (e.clientY-40) + "px";
}
function hideTip() {
  document.getElementById("tooltip").style.display = "none";
}

render();
</script>
</body>
</html>
